server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the React SPA — all unknown routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api and /storage requests to Laravel
    location ~ ^/(api|storage)/ {
        proxy_pass         http://pam_backend:9000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # For PHP-FPM, use fastcgi instead
        fastcgi_pass       pam_backend:9000;
        fastcgi_index      index.php;
        fastcgi_param      SCRIPT_FILENAME /var/www/html/public/index.php;
        include            fastcgi_params;
    }

    # Laravel public files (uploaded logos, PDFs, etc.)
    location /storage/ {
        proxy_pass http://pam_backend:9000;
    }

    client_max_body_size 20M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
