server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Proxy all /api requests to Laravel via PHP-FPM
    location /api/ {
        fastcgi_pass        pam_backend:9000;
        fastcgi_index       index.php;
        fastcgi_param       SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param       REQUEST_URI $request_uri;
        include             fastcgi_params;
    }

    # Proxy /storage (uploaded files, PDFs, logos) to Laravel backend
    location /storage/ {
        proxy_pass          http://pam_backend:9000;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
    }

    # Serve the React SPA — all other routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
