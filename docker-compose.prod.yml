services:

  # ── MySQL Database ─────────────────────────────────────────────────────────
  pam_db:
    image: mysql:8.0
    container_name: pam_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: printer_assets
      MYSQL_USER: pam_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - pam_mysql_data:/var/lib/mysql
    networks:
      - pam_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 300s

  # ── Laravel Backend (PHP-FPM) ──────────────────────────────────────────────
  pam_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: pam_backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      DB_CONNECTION: mysql
      DB_HOST: pam_db
      DB_PORT: 3306
      DB_DATABASE: printer_assets
      DB_USERNAME: pam_user
      DB_PASSWORD: ${DB_PASSWORD}
      FRONTEND_URL: ${APP_URL}
    volumes:
      - pam_storage:/var/www/html/storage/app
      - pam_logs:/var/www/html/storage/logs
    depends_on:
      pam_db:
        condition: service_healthy
    networks:
      - pam_net

  # ── Nginx (serves frontend + proxies API) ─────────────────────────────────
  pam_nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: pam_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8900}:80"
    depends_on:
      - pam_backend
    networks:
      - pam_net

  # ── phpMyAdmin ────────────────────────────────────────────────────────────────
  pam_phpmyadmin:
    image: phpmyadmin:latest
    container_name: pam_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: pam_db
      PMA_USER: pam_user
      PMA_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8901:80"
    depends_on:
      pam_db:
        condition: service_healthy
    networks:
      - pam_net

volumes:
  pam_mysql_data:
  pam_storage:
  pam_logs:

networks:
  pam_net:
    driver: bridge
